<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS Spatial AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Modern UI Styling */
        :root {
            --primary-color: #00619b; /* Esri-style blue */
            --primary-hover: #004a77;
            --bg-color: #f0f4f8;
            --chat-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
            --user-msg-bg: #e1f5fe;
            --ai-msg-bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px 24px;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Setup Panel for Keys and URL */
        .setup-panel {
            padding: 20px 24px;
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input[type="text"], input[type="password"] {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 97, 155, 0.1);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            color: #94a3b8;
        }

        /* Chat History Area */
        #chat-history {
            height: 50vh;
            min-height: 400px;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: var(--chat-bg);
        }

        /* Chat Bubbles */
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user {
            background-color: var(--user-msg-bg);
            color: #0c4a6e;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .assistant {
            background-color: var(--ai-msg-bg);
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .system {
            align-self: center;
            background: none;
            color: #64748b;
            font-size: 0.85rem;
            font-style: italic;
            padding: 4px 12px;
            max-width: 100%;
            text-align: center;
        }

        /* Bottom Chat Input */
        .input-panel {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            background: #fafbfc;
        }

        .input-panel input {
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Spatial AI Assistant</h1>
        </header>
        
        <div class="setup-panel">
            <div class="input-group">
                <label for="api-key">Anthropic API Key (Required)</label>
                <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
            </div>
            <div class="input-group">
                <label for="render-url">Render MCP Server URL</label>
                <input type="text" id="render-url" placeholder="https://your-app.onrender.com/sse" value="https://your-app.onrender.com/sse">
            </div>
            <button id="connect-btn">Connect to Server</button>
        </div>

        <div id="chat-history">
            <div class="message system">Waiting for connection... Please enter your credentials and connect above.</div>
        </div>
        
        <div class="input-panel">
            <input type="text" id="user-input" placeholder="e.g., Query the wwtp_phosphorus layer for..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
