<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS Spatial AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Modern UI Styling */
        :root {
            --primary-color: #00619b; /* Esri-style blue */
            --primary-hover: #004a77;
            --bg-color: #f0f4f8;
            --chat-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
            --user-msg-bg: #e1f5fe;
            --ai-msg-bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            background: var(--chat-bg);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Main Content Area - Dashboard */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        .dashboard-container {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .dashboard-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Right Sidebar - Chatbot */
        .chat-panel {
            width: 380px;
            background: var(--chat-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-width: 300px;
            max-width: 450px;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Setup Panel for Keys and URL */
        .setup-panel {
            padding: 14px 16px;
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 140px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
        }

        input[type="text"], input[type="password"] {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 97, 155, 0.1);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            color: #94a3b8;
        }

        /* Chat History Area */
        #chat-history {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: var(--chat-bg);
        }

        /* Chat Bubbles */
        .message {
            max-width: 95%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .user {
            background-color: var(--user-msg-bg);
            color: #0c4a6e;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .assistant {
            background-color: var(--ai-msg-bg);
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .system {
            align-self: center;
            background: none;
            color: #64748b;
            font-size: 0.8rem;
            font-style: italic;
            padding: 4px 8px;
            max-width: 100%;
            text-align: center;
        }

        /* Bottom Chat Input */
        .input-panel {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            background: #fafbfc;
        }

        .input-panel input {
            flex: 1;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Main Content Area with Dashboard -->
        <div class="main-content">
            <div class="dashboard-container">
                <iframe src="https://www.arcgis.com/apps/dashboards/9992e26805234c23ba91104bc6eb554f" title="ArcGIS Dashboard"></iframe>
            </div>
        </div>

        <!-- Right Sidebar - Chatbot -->
        <div class="chat-panel">
            <header>
                <h1>Spatial AI Assistant</h1>
            </header>
            
            <div class="setup-panel">
                <div class="input-group">
                    <label for="api-key">Anthropic API Key</label>
                    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="render-url">Render MCP Server URL</label>
                    <input type="text" id="render-url" placeholder="https://your-app.onrender.com/sse" value="https://your-app.onrender.com/sse">
                </div>
                <button id="connect-btn" style="width: 100%;">Connect to Server</button>
            </div>

            <div id="chat-history">
                <div class="message system">Waiting for connection... Please enter your credentials and connect above.</div>
            </div>
            
            <div class="input-panel">
                <input type="text" id="user-input" placeholder="Ask a question..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
