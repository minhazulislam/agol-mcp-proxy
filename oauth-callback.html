<!doctype html>
<html>
  <!--
    OAuth popup callback page required by ArcGIS IdentityManager.
    This file must be served at the exact URL registered as the redirect URI
    in your ArcGIS Online application settings.
    e.g. https://agol-mcp-proxy.onrender.com/oauth-callback.html
  -->
  <head>
    <script>
      function loadHandler() {
        if (opener) {
          if (location.hash) {
            if (typeof opener.require === "function" && opener.require("esri/kernel")) {
              opener.require("esri/kernel").id.setOAuthResponseHash(location.hash);
            } else {
              opener.dispatchEvent(new CustomEvent("arcgis:auth:hash", { detail: location.hash }));
            }
            close();
          } else if (location.search) {
            opener.dispatchEvent(
              new CustomEvent("arcgis:auth:location:search", {
                detail: location.search,
              }),
            );
            close();
          }
        } else {
          close();
        }
      }
    </script>
  </head>
  <body onload="loadHandler();"></body>
</html>
